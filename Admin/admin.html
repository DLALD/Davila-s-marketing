<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Davila's Marketing</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-main">DAVILA'S</span>
      <span class="logo-sub">Admin Panel</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-section="businesses">🏢 Businesses</a>
      <a href="../Pagina principal/index.html" class="nav-item" target="_blank">🌐 View Site</a>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="admin-main">

    <!-- HEADER -->
    <header class="admin-header">
      <h1>Businesses</h1>
      <button class="btn-add" id="btnAdd">+ Add Business</button>
    </header>

    <!-- BUSINESSES LIST -->
    <section id="businessesList" class="businesses-list"></section>

  </main>

  <!-- MODAL: ADD / EDIT BUSINESS -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Add Business</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>

      <form id="bizForm" class="biz-form">
        <input type="hidden" id="bizIndex" value="-1" />

        <div class="form-grid">
          <div class="form-group">
            <label>Business Name *</label>
            <input type="text" id="bizName" placeholder="e.g. Davila's Autos Detailing" required />
          </div>
          <div class="form-group">
            <label>Category *</label>
            <input type="text" id="bizCategory" placeholder="e.g. Auto Detailing" required />
          </div>
          <div class="form-group full">
            <label>Description *</label>
            <textarea id="bizDescription" rows="3" placeholder="Short description of the business..." required></textarea>
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="text" id="bizPhone" placeholder="+1 (234) 567-890" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="bizEmail" placeholder="contact@business.com" />
          </div>
          <div class="form-group">
            <label>Address</label>
            <input type="text" id="bizAddress" placeholder="City, Country" />
          </div>
          <div class="form-group">
            <label>Business Hours</label>
            <input type="text" id="bizHours" placeholder="Mon–Fri: 9am – 6pm" />
          </div>
          <div class="form-group">
            <label>Website URL</label>
            <input type="url" id="bizWebsite" placeholder="https://yourbusiness.com" />
          </div>
          <div class="form-group">
            <label>Hero Image URL</label>
            <input type="url" id="bizHeroImage" placeholder="https://..." />
          </div>
          <div class="form-group full">
            <label>Services <span class="hint">(one per line)</span></label>
            <textarea id="bizServices" rows="4" placeholder="Full Interior Detailing&#10;Exterior Wash & Wax&#10;Paint Correction"></textarea>
          </div>
          <div class="form-group full">
            <label>Gallery Images <span class="hint">(one URL per line)</span></label>
            <textarea id="bizGallery" rows="4" placeholder="https://image1.jpg&#10;https://image2.jpg"></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-cancel" id="btnCancel">Cancel</button>
          <button type="submit" class="btn-save">Save Business</button>
        </div>
      </form>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
